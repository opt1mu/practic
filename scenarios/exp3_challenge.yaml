name: exp3-challenge-emulator
target: "http://127.0.0.1:8080"

load_profile:
  type: "uniform"
  step_duration_sec: 2
  step_rps: 5
  spike_start_sec: 10
  spike_duration_sec: 5
  spike_rps: 20

limits:
  duration_seconds: 15
  max_requests: 150
  max_rps: 10
  virtual_users: 4

stop_conditions:
  error_rate_percent: 100
  status_429_count: 10
  p95_latency_ms: 3000

steps:
  - request:
      method: GET
      path: "/waf-challenge"
      headers:
        X-Custom-Header: "SecureGeneratorV1"
    expect:
      status:
        - 403
    pause_ms:
      min: 200
      max: 500