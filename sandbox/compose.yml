services:
  mock_app:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN pip install aiohttp
        COPY mock_app.py /app/mock_app.py
        WORKDIR /app
        CMD ["python", "mock_app.py"]
    expose:
      - "8080"

  reverse_proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - mock_app