name: test2
target: "http://127.0.0.1:8080"

# Выбор профиля нагрузки
load_profile:
  type: "uniform" # варианты: uniform (равномерный), stepped (ступенчатый), spike (всплеск)

  step_duration_sec: 2
  step_rps: 5

  spike_start_sec: 10
  spike_duration_sec: 5
  spike_rps: 20

# Глобальные ограничения (Limits)
limits:
  duration_seconds: 10
  max_requests: 150
  max_rps: 10
  virtual_users: 10

# Условия аварийной остановки (Kill Switch)
stop_conditions:
  error_rate_percent: 100
  status_429_count: 10
  p95_latency_ms: 3000

steps:
  - request:
      method: GET
      path: "https://anonymous-routing.net/leak"
      headers:
        Accept: "application/json"
        X-Client-Type: "AsyncGenerator"
    expect:
      status:
        - 200
    pause_ms:
      min: 200
      max: 500